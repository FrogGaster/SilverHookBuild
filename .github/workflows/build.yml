name: Build Executable

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Project
      shell: powershell
      run: |
        .\build.ps1 -Configuration Release -Platform x64

    - name: Upload Loader EXE
      uses: actions/upload-artifact@v4
      with:
        name: ZA_PUTINA_Loader
        path: x64/Release/ZA_PUTINA_Loader.exe

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: ZA_PUTINA_DLL
        path: x64/Release/ZA_PUTINA.dll
